name: .net-build
on: 
  push: 
    branches: [ "main" ]
  pull_request: 
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: restore dependencies
        run: dotnet restore
      - name: build  
        run: dotnet build

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: checkout code  
        uses: actions/checkout@v4
      - name: setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: restore dependencies
        run: dotnet restore
      - name: test  
        run: dotnet test --configuration Release --verbosity normal
      
